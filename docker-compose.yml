# Laboratorio - Bitácora 4
version: '3.8'
services:
  servidor_ssh:
    image: linuxserver/openssh-server:latest
    container_name: lab_ssh_servidor
    environment:
      - PUID-1000
      - PGID-1000
      - TZ-Europe/Madrid
      - USER_NAME=alumno
      - USER_PASSWORD=sistemas_informaticos
      - PASSWORD_ACCESS=true
    ports:
      - "2222:2222" # Mapeamos el puerto 2222 local al 2222 del contenedor
    restart: unless-stopped
  
  servidor_rdp:
    image: linuxserver/webtop:ubuntu-xfce
    container_name: lab_rdp_servidor
    environment:
      - PUID=1000
      - PGID=1000
      - TZ-Europe/Madrid
    ports:
      - "3389:3389" # Puerto estándar de RDP (Escritorio Remoto)
      - "3000:3000" # Puerto para acceso por navegador
    shm_size: "1gb"
    restart: unless-stopped
